<div class="card shadow-lg border-0 rounded-3 p-0">
  <div class="card-body">
    <fieldset class="border rounded-3 p-2">
    <legend class="float-none w-auto px-2 text-primary">
        Create Product Type
    </legend>
    
    <div class="card-body">
        <form  [formGroup]="categoryForm" (ngSubmit)="onSubmit()" class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold small">Category Name <span style="color: red;">*</span></label>
            
                <select class="form-control" formControlName="categoryId" (change)="getSubCategory($any($event.target).value)">
                    <option value="">--Select Category--</option>
                    <option *ngFor="let category of categoryLists" [value]="category.id">
                            {{category.name}}
                    </option>
                </select>

                <div *ngIf="categoryForm.get('categoryId')?.touched && categoryForm.get('categoryId')?.invalid">
                    <small *ngIf="categoryForm.get('categoryId')?.errors?.['required']" style="color: red;">
                        Please Select
                    </small>
                </div> 
            </div>

          <div class="col-md-4">
            <label class="form-label fw-bold small">SubCategory Name <span style="color: red;">*</span></label>
            
             <select class="form-control" formControlName="subCategoryId">
                <option value="">--Select Category--</option>
                <option *ngFor="let subCat of subCatList" [value]="subCat.id">
                        {{subCat.name}}
                </option>
            </select>

            <div *ngIf="categoryForm.get('subCategoryId')?.touched && categoryForm.get('subCategoryId')?.invalid">
                <small *ngIf="categoryForm.get('subCategoryId')?.errors?.['required']" style="color: red;">
                    Please Select
                </small>
            </div> 
          </div>

            <div class="col-md-4">
            <label class="form-label fw-bold small">Product Type <span style="color: red;">*</span></label>
            
            <input 
              type="text" 
              class="form-control"
              placeholder="Enter Product Type"
              formControlName="productType">
              <div *ngIf="categoryForm.get('productType')?.touched && categoryForm.get('productType')?.invalid">

                <small *ngIf="categoryForm.get('productType')?.errors?.['required']" style="color: red;">
                  Input required 
                </small>
              </div>
          </div>

          <!-- Item Serial Number -->
          <!-- <div class="col-md-4">
            <label class="form-label fw-bold small">Slug<span style="color: red;">*</span></label>
            <input 
              type="text" 
              class="form-control"
              placeholder="Enter Slug"
              formControlName="slug">
              <div *ngIf="categoryForm.get('slug')?.touched && categoryForm.get('slug')?.invalid">

                <small *ngIf="categoryForm.get('slug')?.errors?.['required']" style="color: red;">
                  Input required
                </small>

              </div>
          </div> -->
        <!-- Buttons -->
          <div class="col-12 text-end">
            <button 
              type="button"
              class="btn btn-danger rounded-pill px-4 shadow-sm"
              (click)="goBack()">
              Back
            </button>
            &nbsp;
            <button 
              type="submit"
              class="btn btn-primary rounded-pill px-4 shadow-sm">
              🚀 Submit
            </button>
          </div>
        </form>
    </div>
  </fieldset>
  </div>
</div>
