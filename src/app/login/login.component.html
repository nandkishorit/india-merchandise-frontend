<section class="login-section">
  <div class="login-card">
    <!-- Heading -->
    <h2 class="title">India Merchandise 👋</h2>
    <p class="subtitle">Login for a seamless experience</p>

    <!-- ✅ Reactive Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" >
      
      <!-- Email Field -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fa fa-envelope icon"></i>
          <input type="email" formControlName="email" placeholder="Enter your email" />
        </div>
        <div class="error" *ngIf="loginForm?.controls['email'].touched && loginForm?.controls['email'].invalid">
          <small *ngIf="loginForm?.controls['email'].errors?.['required']">Email is required</small>
          <small *ngIf="loginForm?.controls['email'].errors?.['email']">Invalid email format</small>
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fa fa-lock icon"></i>
          <input type="password" formControlName="password" placeholder="Enter your password" />
        </div>
        <div class="error" *ngIf="loginForm.controls['password'].touched && loginForm.controls['password'].invalid">
          <small *ngIf="loginForm.controls['password'].errors?.['required']">Password is required</small>
          <small *ngIf="loginForm.controls['password'].errors?.['minlength']">Min length is 6</small>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn" [disabled]="loading || loginForm.invalid">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <!-- ✅ Success/Error Message -->
    <p class="message" *ngIf="message">{{ message }}</p>

    <!-- Extra Links -->
    <div class="extra-links">
      <a href="#">Forgot Password?</a>
      <a routerLink="/">Skip</a>
      <a routerLink="/register">Create an account</a>
    </div>
  </div>
</section>
